<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUENEAU — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* Login-spezifische Anpassungen: kein Logo/Überschrift; gesamte Seite in Figtree */
        .login-form {
            max-width: 420px;
            margin: 0 auto;
            text-align: left;
            color: #888;
            font-family: 'Figtree', sans-serif; /* gesamte Login-Seite in Figtree */
            padding-top: 100px; /* Abstand oben zum oberen Eingabefeld */
        }

        .login-input {
            width: 100%;
            padding: 12px;
            border-radius: 0;
            border: none;
            box-sizing: border-box;
            margin-bottom: 5px;
            margin-top: 5px;
            font-size: 1em;
            background: #fff;
            color: #888;
        }


        .login-button {
            width: 100%;
            padding: 12px;
            background: #333333;
            color: white;
            border: none;
            border-radius: 0;
            cursor: pointer;
            margin-top: 15px;
            font-size: 1em;
        }
    </style>
</head>

<body>
    <main class="app-shell">
        <section class="container login-form" aria-label="Login">
            <!-- Logo und Überschrift bewusst weggelassen -->

            <form th:action="@{/perform_login}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <label for="username">Benutzername</label>
                <input id="username" name="username" class="login-input" type="text" required autofocus />

                <label for="password">Passwort</label>
                <input id="password" name="password" class="login-input" type="password" required />

                <button class="login-button" type="submit">Anmelden</button>
            </form>

        </section>
    </main>

</body>

</html>
