<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUENEAU</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <main class="app-shell">
        <header class="brand-panel">
            <img class="brand-logo" src="img/queneau.png" alt="QUENEAU">
        </header>

        <section class="composer" aria-label="Text umschreiben">
            <textarea id="input" placeholder="Dein Text..."></textarea>

            <div class="style-picker">
                <select id="style-select" class="source-select" aria-hidden="true" tabindex="-1">
                    <option value="" selected disabled>Exercices de style...</option>
                    <option th:each="s : ${styles}" th:value="${s}" th:text="${s}"></option>
                </select>
                <button id="style-button" class="style-button" type="button" aria-haspopup="listbox"
                    aria-expanded="false">
                    Exercices de style...
                </button>
                <ul id="style-options" class="style-options" role="listbox"></ul>
            </div>

            <div id="status" class="status" role="status" aria-live="polite"></div>
            <div id="history" class="history" aria-live="polite"></div>
        </section>
    </main>

    <script src="script/app.js"></script>
</body>

</html>
